query ListApps(
  $filters: AppFilter,
  $sort: [AppSortEnum]!,
  $first: Int!,
  $after: String
) {
  listApps(
    filters: $filters,
    sort: $sort,
    first: $first,
    after: $after
  ) {
    edges {
      node {
        id
        packageName
        packageIcon
        packageLabel
        category
        totalRating
        numberOfRatings
        availablePacks
      }
    }
    pageInfo {
      hasNextPage
        endCursor
    }
  }
}

query GetApp(
  $id: ID!,
  $packsSort: [PackSortEnum]!,
  $packsFirst: Int!,
  $ratingsSort: [RatingSortEnum]!,
  $ratingsFirst: Int!
) {
  getApp(
    id: $id
  ) {
    uiRating
    screenreadersRating
    labelsRating
    functionsRating
    performanceRating
    totalRating
    packs (
      sort: $packsSort,
      first: $packsFirst
    ) {
      edges {
        node {
          id
          numberOfLabels
          downloads
          language
          hash
          createdAt
          updatedAt
          user {
            id
            name
            picture
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
    ratings (
      sort: $ratingsSort,
      first: $ratingsFirst
    ) {
      edges {
        node {
          id
          ui
          screenreaders
          labels
          functions
          performance
          comment
          commentLanguage
          createdAt
          updatedAt
          user {
            id
            name
            picture
          }
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

