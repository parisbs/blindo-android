query GetUser($sub: String!) {
  getUser(sub: $sub) {
    id
    name
    picture
    isPremium
  }
}

query AuthenticateUser {
  authenticateUser {
    id
    name
    picture
    isPremium
  }
}

query GetPublicUser(
  $id: ID!,
  $packsFilters: PackFilter,
  $packsSort: [PackSortEnum]!,
  $packsFirst: Int!,
  $ratingsFilters: RatingFilter,
  $ratingsSort: [RatingSortEnum]!,
  $ratingsFirst: Int!
) {
  getPublicUser(id: $id) {
    name
    picture
    numberOfPacks
    numberOfRatings
    packs(
      filters: $packsFilters,
      sort: $packsSort,
      first: $packsFirst
    ) {
      edges {
        node {
          id
          numberOfLabels
          downloads
          language
          hash
          app {
            id
            packageName
            packageIcon
            packageLabel
            category
          }
          createdAt
          updatedAt
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
    ratings(
      filters: $ratingsFilters,
      sort: $ratingsSort,
      first: $ratingsFirst
    ) {
      edges {
        node {
          id
          screenreaders
          labels
          functions
          performance
          comment
          commentLanguage
          app {
            id
            packageName
            packageIcon
            packageLabel
            category
          }
          createdAt
          updatedAt
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query GetPublicUserPacks(
  $id: ID!,
  $packsFilters: PackFilter,
  $packsSort: [PackSortEnum]!,
  $packsFirst: Int!,
  $packsAfter: String
) {
  getPublicUser(id: $id) {
    numberOfPacks
    packs(
      filters: $packsFilters,
      sort: $packsSort,
      first: $packsFirst,
      after: $packsAfter
    ) {
      edges {
        node {
          id
          numberOfLabels
          downloads
          language
          hash
          app {
            id
            packageName
            packageIcon
            packageLabel
            category
          }
          createdAt
          updatedAt
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

query GetPublicUserRatings(
  $id: ID!,
  $ratingsFilters: RatingFilter,
  $ratingsSort: [RatingSortEnum]!,
  $ratingsFirst: Int!,
  $ratingsAfter: String
) {
  getPublicUser(id: $id) {
    numberOfRatings
    ratings(
      filters: $ratingsFilters,
      sort: $ratingsSort,
      first: $ratingsFirst,
      after: $ratingsAfter
    ) {
      edges {
        node {
          id
          screenreaders
          labels
          functions
          performance
          comment
          commentLanguage
          app {
            id
            packageName
            packageIcon
            packageLabel
            category
          }
          createdAt
          updatedAt
        }
      }
      pageInfo {
        hasNextPage
        endCursor
      }
    }
  }
}

mutation CreateUser(
  $input: CreateUserInput!
) {
  createUser(
    input: $input
  ) {
    user {
      id
      name
      picture
    }
  }
}

mutation UpdateUser(
  $input: UpdateUserInput!
) {
  updateUser(
    input: $input
  ) {
    user {
      id
      name
      picture
      isPremium
    }
  }
}
