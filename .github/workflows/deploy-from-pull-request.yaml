name: Deploy from pull request

concurrency:
  group: deploy-blindo-version
  cancel-in-progress: true

on:
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'version.gradle'

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    uses: ./.github/workflows/deploy-blindo-version.yaml
    secrets: inherit
    with:
      packageType: aab
      variant: release
      enableDownload: false
      shouldPublishInPlayConsole: true
      track: internal
      userFraction: 1.0
      inAppUpdatePriority: 5
